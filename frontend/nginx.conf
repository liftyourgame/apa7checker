server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* requests to the backend container.
    # The service name "backend" is resolved by Docker Compose's internal DNS.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support large file uploads (matches MAX_UPLOAD_SIZE_MB)
        client_max_body_size 50M;

        # Allow enough time for GPT to process large documents
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
    }

    # Aggressive caching for hashed Vite assets
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
